  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1B2A; --saffron: #FF6B00; --saff2: #FF8C33;
      --white: #FFFFFF; --off: #F7F9FC;
    }

    /* Header injected by header.js */

    /* ── BODY ── */
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 16px 28px;
      overflow-x: hidden; position: relative;
    }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.15; pointer-events: none;
      animation: drift 12s ease-in-out infinite;
    }
    .orb-1 { width: 380px; height: 380px; background: #FF6B00; top: -100px; left: -80px; }
    .orb-2 { width: 320px; height: 320px; background: #7C3AED; bottom: -80px; right: -60px; animation-delay: 4s; }
    .orb-3 { width: 220px; height: 220px; background: #0891B2; top: 40%; left: 55%; animation-delay: 8s; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(16px, -16px); }
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 40px 36px 36px;
      max-width: 480px; width: 100%; text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }
    .logo-icon {
      width: 44px; height: 44px; background: var(--saffron);
      border-radius: 11px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .logo-text { font-size: 19px; font-weight: 900; color: var(--white); letter-spacing: -0.4px; }
    .logo-text span { color: var(--saffron); }

    .headline {
      font-size: 26px; font-weight: 900; line-height: 1.3;
      letter-spacing: -0.5px; margin-bottom: 10px;
    }
    .headline .hi { color: var(--saffron); }

    .sub {
      font-size: 13.5px; color: rgba(255,255,255,0.48);
      margin-bottom: 30px; line-height: 1.65;
    }

    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider-label {
      font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;
    }

    /* ── LANG BUTTONS ── */
    .lang-options { display: flex; flex-direction: column; gap: 12px; }
    .lang-btn {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px; border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      cursor: pointer; transition: all 0.2s ease;
      text-decoration: none; color: var(--white);
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,107,0,0.1), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .lang-btn:hover::before, .lang-btn:active::before { opacity: 1; }
    .lang-btn:hover { border-color: var(--saffron); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,0,0.18); }
    .lang-btn:active { transform: scale(0.98); }

    .btn-hindi { border-color: rgba(255,107,0,0.3); }
    .btn-hindi .lang-name { color: var(--saff2); }
    .btn-english { border-color: rgba(8,145,178,0.3); }
    .btn-english .lang-name { color: #38BDF8; }

    .lang-flag { font-size: 34px; flex-shrink: 0; line-height: 1; }
    .lang-info { flex: 1; text-align: left; min-width: 0; }
    .lang-name { font-size: 17px; font-weight: 800; line-height: 1.2; margin-bottom: 3px; }
    .lang-sub {
      font-size: 12.5px; color: rgba(255,255,255,0.42); font-weight: 400;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lang-sub-hi { font-family: 'Noto Sans Devanagari', sans-serif; }
    .lang-arrow {
      font-size: 18px; color: rgba(255,255,255,0.28);
      transition: transform 0.2s, color 0.2s; flex-shrink: 0;
    }
    .lang-btn:hover .lang-arrow { transform: translateX(4px); color: var(--saffron); }

    .footer-note { margin-top: 24px; font-size: 11.5px; color: rgba(255,255,255,0.22); }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .card { padding: 30px 20px 28px; border-radius: 16px; }

      .sub { font-size: 13px; margin-bottom: 24px; }
      .lang-btn { padding: 15px 16px; gap: 12px; }

      .lang-sub { font-size: 11.5px; }
      .logo-wrap { margin-bottom: 18px; }
      .divider { margin-bottom: 18px; }
    }

    @media (max-width: 360px) {
      .card { padding: 24px 14px 22px; }
      .headline { font-size: 18px; }
      .lang-flag { font-size: 24px; }
      .lang-name { font-size: 14px; }
    }
