<script>
const TOTAL_Q = 15;
let score = 0, streak = 0, qnum = 0, mode = 'identify', currentLevel = 'easy';
let currentQ = null, answered = false, selectedSlices = [];

// ── LEVEL QUESTION POOLS ─────────────────────────────────
const Q_EASY = [
  // Denominators 2, 3, 4 only — beginner
  {n:1,d:2},{n:1,d:3},{n:2,d:3},{n:1,d:4},{n:3,d:4},
  {n:2,d:4},{n:1,d:2},{n:3,d:4},{n:2,d:3},{n:1,d:4},
  {n:1,d:3},{n:3,d:4},{n:1,d:2},{n:2,d:3},{n:1,d:4},
  {n:3,d:4},{n:1,d:3},{n:2,d:4},{n:1,d:2},{n:2,d:3}
];

const Q_MEDIUM = [
  // Denominators 5, 6, 8 — intermediate
  {n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5},
  {n:1,d:6},{n:5,d:6},{n:2,d:6},{n:4,d:6},{n:3,d:6},
  {n:1,d:8},{n:3,d:8},{n:5,d:8},{n:7,d:8},{n:2,d:8},{n:6,d:8},
  {n:4,d:8},{n:3,d:5},{n:2,d:5},{n:5,d:6},{n:4,d:6}
];

const Q_HARD = [
  // Denominators 10, 12 — advanced
  {n:1,d:10},{n:3,d:10},{n:7,d:10},{n:9,d:10},{n:5,d:10},
  {n:2,d:10},{n:4,d:10},{n:6,d:10},{n:8,d:10},
  {n:1,d:12},{n:5,d:12},{n:7,d:12},{n:11,d:12},{n:3,d:12},
  {n:4,d:12},{n:9,d:12},{n:10,d:12},{n:2,d:12},
  {n:3,d:10},{n:7,d:12}
];

// Shuffle and pick TOTAL_Q from current level pool
let questions = [];
function buildQuestionList() {
  const pool = currentLevel === 'easy'   ? Q_EASY   :
               currentLevel === 'medium' ? Q_MEDIUM : Q_HARD;
  const doubled = [...pool, ...pool];
  for (let i = doubled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [doubled[i], doubled[j]] = [doubled[j], doubled[i]];
  }
  questions = doubled.slice(0, TOTAL_Q);
}

function setLevel(lv) {
  currentLevel = lv;
  // Update tab active states
  ['easy','medium','hard'].forEach(l => {
    const t = document.getElementById('ltab-'+l);
    t.classList.remove('active','easy-active','medium-active','hard-active');
  });
  const active = document.getElementById('ltab-'+lv);
  active.classList.add('active', lv+'-active');
  // Reset game
  score=0; streak=0; qnum=0;
  buildQuestionList();
  updateStats();
  nextQuestion();
}

function gcd(a,b) { return b===0 ? a : gcd(b,a%b); }
function simplify(n,d) { const g=gcd(n,d); return {n:n/g, d:d/g}; }
function fracEqual(n1,d1,n2,d2) {
  const a=simplify(n1,d1), b=simplify(n2,d2);
  return a.n===b.n && a.d===b.d;
}
function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function getLevel(d) {
  if (d <= 4) return {lbl:'Easy 😊',   cls:'level-easy'};
  if (d <= 6) return {lbl:'Medium 🤔', cls:'level-medium'};
  return {lbl:'Hard 💪',   cls:'level-hard'};
}

function setMode(m) {
  mode = m;
  document.getElementById('tab-identify').classList.toggle('active', m==='identify');
  document.getElementById('tab-shade').classList.toggle('active', m==='shade');
  score=0; streak=0; qnum=0;
  buildQuestionList();
  updateStats();
  nextQuestion();
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak > 0 ? streak+'🔥' : streak;
  document.getElementById('qnum').textContent = Math.min(qnum+1,TOTAL_Q)+'/'+TOTAL_Q;
  document.getElementById('progress').style.width = (qnum/TOTAL_Q*100)+'%';
}

function makePizzaSVG(slices, highlighted, size, interactive) {
  const cx=size/2, cy=size/2, r=size*0.43, ir=size*0.07;
  const ao = -Math.PI/2;
  const toppingR = r * 0.55;
  let paths = '', toppings = '';

  // Generate random topping positions (deterministic for this pizza)
  const tPos = [
    {a:0.3,d:0.5},{a:1.2,d:0.6},{a:2.1,d:0.4},{a:3.5,d:0.55},
    {a:4.8,d:0.45},{a:5.5,d:0.35},{a:0.9,d:0.3},{a:2.8,d:0.38}
  ];
  tPos.forEach(t => {
    const x = cx + toppingR*t.d*Math.cos(t.a);
    const y = cy + toppingR*t.d*Math.sin(t.a);
    toppings += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${size*0.03}" fill="#C0392B" opacity="0.85"/>`;
    toppings += `<circle cx="${(x+size*0.012).toFixed(1)}" cy="${(y+size*0.008).toFixed(1)}" r="${size*0.014}" fill="#2C7A2C" opacity="0.7"/>`;
  });

  for (let i=0; i<slices; i++) {
    const a1 = ao + (i/slices)*2*Math.PI;
    const a2 = ao + ((i+1)/slices)*2*Math.PI;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1), iy1=cy+ir*Math.sin(a1);
    const ix2=cx+ir*Math.cos(a2), iy2=cy+ir*Math.sin(a2);
    const isHL = interactive ? selectedSlices.includes(i) : (i < highlighted);
    const fill = isHL ? '#E8503A' : '#F9D875';
    const onclick = interactive ? `onclick="toggleSlice(${i},${slices})"` : '';
    const cursor = interactive ? 'cursor:pointer;' : '';
    const mid = a1 + (a2-a1)/2;
    const tx = cx + r*0.63*Math.cos(mid);
    const ty = cy + r*0.63*Math.sin(mid);
    paths += `<path d="M${ix1.toFixed(1)},${iy1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 0 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 0 0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${fill}" stroke="#8B5E3C" stroke-width="1.8" style="${cursor}" ${onclick}/>`;
    if (slices <= 10) {
      paths += `<text x="${tx.toFixed(1)}" y="${(ty+1.5).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="${size*0.075}" fill="#7A4E28" font-family="Nunito,sans-serif" font-weight="700" pointer-events="none" style="user-select:none">${i+1}</text>`;
    }
  }

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r+3}" fill="${'#C4874E'}"/>
    <circle cx="${cx}" cy="${cy}" r="${r+1.5}" fill="#D4944F"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#F9D875"/>
    ${paths}
    ${!interactive ? toppings : ''}
    <circle cx="${cx}" cy="${cy}" r="${ir}" fill="#D4944F" stroke="#8B5E3C" stroke-width="1.5"/>
  </svg>`;
}

function toggleSlice(i, total) {
  if (answered) return;
  const idx = selectedSlices.indexOf(i);
  if (idx === -1) selectedSlices.push(i);
  else selectedSlices.splice(idx, 1);
  document.getElementById('pizza-interactive').innerHTML = makePizzaSVG(total, 0, 220, true);
  updateShadeHint();
}

function updateShadeHint() {
  const el = document.getElementById('shade-hint');
  if (el && currentQ) {
    const s = selectedSlices.length;
    el.innerHTML = `<b>${s}</b> slice${s!==1?'s':''} selected — need <b>${currentQ.n}</b>`;
  }
}

function nextQuestion() {
  if (qnum >= TOTAL_Q) { showEnd(); return; }
  answered = false;
  selectedSlices = [];
  currentQ = questions[qnum];
  updateStats();
  if (mode === 'identify') renderIdentify(currentQ);
  else renderShade(currentQ);
}

function getCurrentPool() {
  return currentLevel === 'easy' ? Q_EASY : currentLevel === 'medium' ? Q_MEDIUM : Q_HARD;
}

function renderIdentify(frac) {
  const level = getLevel(frac.d);
  // Build 3 wrong options from current level pool
  const pool = getCurrentPool().filter(f => !fracEqual(f.n,f.d,frac.n,frac.d));
  const wrongs = shuffle(pool).slice(0,3);
  const opts = shuffle([frac, ...wrongs]);

  document.getElementById('game-area').innerHTML = `
    <div style="text-align:center;margin-bottom:6px">
      <span class="level-badge ${level.cls}">${level.lbl}</span>
    </div>
    <div class="question-text">What fraction of the pizza is shaded? 🎨</div>
    <div class="pizza-wrap" id="pizza-display">
      ${makePizzaSVG(frac.d, frac.n, 220, false)}
    </div>
    <div class="slice-info">
      Pizza cut into <b>${frac.d}</b> equal slices — <b style="color:#D94F3D">${frac.n}</b> slice(s) are shaded
    </div>
    <div class="options-grid" id="opts-grid">
      ${opts.map(f => `
        <button class="opt-btn" onclick="checkIdentify(${f.n},${f.d},this)">
          <span class="opt-frac">
            <span class="num">${f.n}</span>
            <span class="den">${f.d}</span>
          </span>
        </button>
      `).join('')}
    </div>
    <div class="feedback hint" id="feedback">Choose the correct fraction! 👆</div>
  `;
}

function renderShade(frac) {
  const level = getLevel(frac.d);
  document.getElementById('game-area').innerHTML = `
    <div style="text-align:center;margin-bottom:6px">
      <span class="level-badge ${level.cls}">${level.lbl}</span>
    </div>
    <div class="question-text">
      Pizza ke
      <span class="frac-big"><span class="num">${frac.n}</span><span class="den">${frac.d}</span></span>
      slices — click to shade them! 🖱️
    </div>
    <div class="pizza-wrap">
      <div id="pizza-interactive">${makePizzaSVG(frac.d, 0, 220, true)}</div>
    </div>
    <div class="shade-hint" id="shade-hint"><b>0</b> slices selected — need <b>${frac.n}</b></div>
    <button class="check-btn" onclick="checkShade()" id="check-btn">✓ Check Answer</button>
    <div class="feedback hint" id="feedback">Click the slices then check your answer!</div>
  `;
}

function checkIdentify(n, d, btn) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const correct = fracEqual(n, d, currentQ.n, currentQ.d);
  if (correct) {
    btn.classList.add('correct');
    const bonus = streak >= 2 ? 20 : 10;
    score += bonus;
    streak++;
    const msg = streak >= 3 ? `🔥 ${streak} streak! +${bonus} points!` : '✅ Correct! Well done!';
    showFeedback(msg, 'correct');
    launchBurst(streak >= 3 ? 80 : 50);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => {
      const bn = parseInt(b.querySelector('.num').textContent);
      const bd = parseInt(b.querySelector('.den').textContent);
      if (fracEqual(bn, bd, currentQ.n, currentQ.d)) b.classList.add('correct');
    });
    streak = 0;
    showFeedback(`❌ Wrong! The correct answer was ${currentQ.n}/${currentQ.d}`, 'wrong');
  }
  qnum++;
  updateStats();
  setTimeout(nextQuestion, 1800);
}

function checkShade() {
  if (answered) return;
  answered = true;
  document.getElementById('check-btn').disabled = true;
  const sel = selectedSlices.length;
  const correct = sel === currentQ.n;
  // Show correct highlighting
  document.getElementById('pizza-interactive').innerHTML = makePizzaSVG(currentQ.d, currentQ.n, 220, false);
  if (correct) {
    const bonus = streak >= 2 ? 20 : 10;
    score += bonus;
    streak++;
    const msg = streak >= 3 ? `🔥 ${streak} streak! +${bonus}!` : `✅ Correct! ${currentQ.n}/${currentQ.d} is right!`;
    showFeedback(msg, 'correct');
    launchBurst(streak >= 3 ? 80 : 50);
  } else {
    streak = 0;
    showFeedback(`❌ Wrong! You selected ${sel}, needed ${currentQ.n}/${currentQ.d}`, 'wrong');
  }
  qnum++;
  updateStats();
  setTimeout(nextQuestion, 2200);
}

function showFeedback(msg, cls) {
  const el = document.getElementById('feedback');
  if (el) { el.textContent = msg; el.className = 'feedback '+cls+' pop'; }
}

function showEnd() {
  document.getElementById('progress').style.width = '100%';
  document.getElementById('qnum').textContent = TOTAL_Q+'/'+TOTAL_Q;
  const pct = Math.round(score / (TOTAL_Q * 20) * 100);
  const lvlName = currentLevel === 'easy' ? '😊 Easy' : currentLevel === 'medium' ? '🤔 Medium' : '💪 Hard';
  let trophy, msg, stars;
  if (pct >= 90) { trophy='🏆'; msg='Fraction Master! Outstanding!'; stars='⭐⭐⭐⭐⭐'; }
  else if (pct >= 75) { trophy='🥇'; msg='Great job! Keep practising!'; stars='⭐⭐⭐⭐'; }
  else if (pct >= 55) { trophy='🥈'; msg='Not bad! Keep going!'; stars='⭐⭐⭐'; }
  else if (pct >= 35) { trophy='🥉'; msg='Good try, keep learning!'; stars='⭐⭐'; }
  else { trophy='🍕'; msg='No worries, try again!'; stars='⭐'; }

  document.getElementById('game-area').innerHTML = `
    <div class="end-screen">
      <div class="trophy">${trophy}</div>
      <div style="margin-bottom:8px"><span class="level-badge ${currentLevel==='easy'?'level-easy':currentLevel==='medium'?'level-medium':'level-hard'}">${lvlName} Level</span></div>
      <h2>${msg}</h2>
      <div class="big-score">${score}<span style="font-size:20px;color:#7A5C3E">/${TOTAL_Q*20}</span></div>
      <p>${pct}% correct</p>
      <div class="stars">${stars}</div>
      <div>
        <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
        <button class="restart-btn secondary" onclick="switchMode()">🔀 Switch Mode</button>
      </div>
      <div style="margin-top:10px">
        <button class="restart-btn secondary" style="font-size:13px;padding:9px 18px" onclick="setLevel('easy')">😊 Easy</button>
        <button class="restart-btn secondary" style="font-size:13px;padding:9px 18px" onclick="setLevel('medium')">🤔 Medium</button>
        <button class="restart-btn secondary" style="font-size:13px;padding:9px 18px" onclick="setLevel('hard')">💪 Hard</button>
      </div>
    </div>
  `;
  launchBurst(120);
  setTimeout(()=>launchBurst(100), 600);
  setTimeout(()=>launchBurst(80), 1200);
}

function restartGame() {
  score=0; streak=0; qnum=0;
  buildQuestionList();
  updateStats();
  nextQuestion();
}

function switchMode() {
  setMode(mode === 'identify' ? 'shade' : 'identify');
}

// ── Sparkle Rain ──────────────────────────────────────────
const canvas = document.getElementById('sparkle-canvas');
const ctx = canvas.getContext('2d');
let sparks = [];
let bgSparks = [];
let burstActive = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Background ambient sparkles (always on, gentle)
function spawnBgSpark() {
  bgSparks.push({
    x: Math.random() * canvas.width,
    y: -10,
    size: Math.random() * 3 + 1,
    speed: Math.random() * 1.2 + 0.4,
    opacity: Math.random() * 0.5 + 0.2,
    color: ['#F5C842','#F07D3A','#D94F3D','#fff','#FFD700','#FF69B4'][Math.floor(Math.random()*6)],
    drift: (Math.random() - 0.5) * 0.6,
    twinkle: Math.random() * Math.PI * 2,
    shape: Math.random() > 0.5 ? 'star' : 'circle'
  });
}

// Burst sparkles on correct answer
function launchBurst(count) {
  burstActive = true;
  const cx = canvas.width / 2;
  const cy = canvas.height * 0.35;
  const colors = ['#F5C842','#F07D3A','#D94F3D','#4CAF6F','#fff','#FFD700','#FF69B4','#00CFFF'];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + Math.random() * 0.4;
    const speed = Math.random() * 8 + 3;
    sparks.push({
      x: cx + (Math.random()-0.5)*60,
      y: cy + (Math.random()-0.5)*40,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random()*4,
      size: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random()*colors.length)],
      opacity: 1,
      decay: Math.random() * 0.02 + 0.015,
      gravity: 0.18,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random()-0.5) * 0.2,
      shape: ['star','circle','diamond','rect'][Math.floor(Math.random()*4)]
    });
  }
}

function drawStar(cx,cy,r,ctx) {
  ctx.beginPath();
  for (let i=0;i<5;i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const ia = (i*4*Math.PI/5 + 2*Math.PI/5) - Math.PI/2;
    if(i===0) ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    else ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    ctx.lineTo(cx+r*0.4*Math.cos(ia), cy+r*0.4*Math.sin(ia));
  }
  ctx.closePath();
}

function drawSparkShape(s, c) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, s.opacity);
  ctx.fillStyle = s.color;
  ctx.translate(s.x, s.y);
  if (s.rotation !== undefined) ctx.rotate(s.rotation);
  if (s.shape === 'star') {
    drawStar(0, 0, s.size, ctx);
    ctx.fill();
  } else if (s.shape === 'diamond') {
    ctx.beginPath();
    ctx.moveTo(0,-s.size); ctx.lineTo(s.size*0.6,0);
    ctx.lineTo(0,s.size); ctx.lineTo(-s.size*0.6,0);
    ctx.closePath(); ctx.fill();
  } else if (s.shape === 'rect') {
    ctx.fillRect(-s.size*0.4, -s.size*0.8, s.size*0.8, s.size*1.6);
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, s.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

let bgSpawnTimer = 0;
function animateSparkles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ambient background sparkles
  bgSpawnTimer++;
  if (bgSpawnTimer % 8 === 0) spawnBgSpark();

  bgSparks = bgSparks.filter(s => {
    s.y += s.speed;
    s.x += s.drift;
    s.twinkle += 0.07;
    s.opacity = (Math.sin(s.twinkle) * 0.25 + 0.35);
    drawSparkShape(s, ctx);
    return s.y < canvas.height + 20;
  });

  // Burst sparks
  sparks = sparks.filter(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.vy += s.gravity;
    s.vx *= 0.98;
    s.opacity -= s.decay;
    if (s.rotation !== undefined) s.rotation += s.rotSpeed;
    drawSparkShape(s, ctx);
    return s.opacity > 0;
  });

  if (sparks.length === 0) burstActive = false;
  requestAnimationFrame(animateSparkles);
}
animateSparkles();
// ── End Sparkle Rain ──────────────────────────────────────

// Start!
document.getElementById('ltab-easy').classList.add('easy-active');
buildQuestionList();
nextQuestion();
</script>
